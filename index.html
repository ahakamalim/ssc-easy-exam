<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            📚 Question Bank
        </div>

        <div class="header-buttons">
            <button id="searchBtn">🔍</button>
            <button id="themeBtn">🌙</button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Subject...">
    </div>

    <!-- Subject Section -->
    <main>

        <div class="subject-card" data-subject="Physics">
            <h2>Physics</h2>
            <p>View Physics Questions</p>
        </div>

        <div class="subject-card" data-subject="Chemistry">
            <h2>Chemistry</h2>
            <p>View Chemistry Questions</p>
        </div>

        <div class="subject-card" data-subject="Biology">
            <h2>Biology</h2>
            <p>View Biology Questions</p>
        </div>

        <div class="subject-card" data-subject="Mathematics">
            <h2>Mathematics</h2>
            <p>View Mathematics Questions</p>
        </div>

        <div class="subject-card" data-subject="Higher Mathematics">
            <h2>Higher Mathematics</h2>
            <p>View Higher Mathematics Questions</p>
        </div>

    </main>

    <!-- Question Page -->
    <section id="questionPage" class="hidden">

        <div class="top-bar">
            <button id="backBtn">⬅ Back</button>
            <h2 id="subjectTitle"></h2>
        </div>

        <div id="questionList">

        </div>

    </section>

    <!-- Admin Button -->
    <button id="adminBtn">
        ⚙
    </button>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal hidden">

        <div class="modal-content">

            <h2>Admin Login</h2>

            <input type="password"
                   id="adminPassword"
                   placeholder="Enter Password">

            <button id="loginBtn">
                Login
            </button>

        </div>

    </div>

    <script type="module" src="firebase.js"></script>
    <script src="script.js"></script>

</body>
</html>
